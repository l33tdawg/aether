services:
  sage:
    image: ghcr.io/l33tdawg/sage:latest
    platform: linux/amd64
    container_name: aether-sage
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache socat >/dev/null 2>&1; sage-gui serve & sleep 5; socat TCP-LISTEN:9080,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:8080"]
    ports:
      - "${SAGE_PORT:-8888}:9080"
    volumes:
      - sage-data:/root/.sage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/v1/dashboard/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  sage-data:
    driver: local
